server:
  port: 8080

spring:
  application:
    name: astock-emotion-system

  threads:
    virtual:
      enabled: true

  datasource:
    mysql:
      url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:astock_business}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      username: ${MYSQL_USER:astock}
      password: ${MYSQL_PASSWORD:pamirs@123}
      driver-class-name: com.mysql.cj.jdbc.Driver

    clickhouse:
      url: jdbc:clickhouse://${CLICKHOUSE_HOST:clickhouse}:${CLICKHOUSE_HTTP_PORT:8123}/${CLICKHOUSE_DATABASE:astock_analysis}?compress=0
      username: ${CLICKHOUSE_USER:default}
      password: ${CLICKHOUSE_PASSWORD:pamirs@123}
      driver-class-name: com.clickhouse.jdbc.ClickHouseDriver

astock:
  redline:
    forbid-trading-instruction: true
    forbid-mock-data: true
    require-rule-version: true
    require-data-lineage: true

spider:
  ths:
    browser:
      remote-url: ${SELENIUM_REMOTE_URL:}
      headless: ${THS_BROWSER_HEADLESS:true}
      chrome-binary: ${THS_CHROME_BINARY:}
      chrome-driver: ${THS_CHROME_DRIVER:}
      proxy-pool: ${THS_PROXY_POOL:149.28.66.23:7890}
      proxy-provider-url: ${THS_PROXY_PROVIDER_URL:}
      proxy-provider-urls: ${THS_PROXY_PROVIDER_URLS:}
      proxy-pool-refresh-seconds: ${THS_PROXY_POOL_REFRESH_SECONDS:300}
      max-proxy-pool-size: ${THS_MAX_PROXY_POOL_SIZE:200}
      min-usable-proxy-count: ${THS_MIN_USABLE_PROXY_COUNT:30}
      proxy-candidate-limit: ${THS_PROXY_CANDIDATE_LIMIT:1000}
      proxy-provider-page-limit: ${THS_PROXY_PROVIDER_PAGE_LIMIT:10}
      proxy-test-url: ${THS_PROXY_TEST_URL:http://q.10jqka.com.cn/gn/}
      proxy-test-urls: ${THS_PROXY_TEST_URLS:http://q.10jqka.com.cn/gn/,http://q.10jqka.com.cn/dy/,http://q.10jqka.com.cn/thshy/,http://q.10jqka.com.cn/zjhhy/}
      proxy-test-timeout-ms: ${THS_PROXY_TEST_TIMEOUT_MS:1500}
      proxy-test-concurrency: ${THS_PROXY_TEST_CONCURRENCY:64}
      proxy-test-candidate-limit: ${THS_PROXY_TEST_CANDIDATE_LIMIT:300}
      proxy-pool-monitor-delay-ms: ${THS_PROXY_POOL_MONITOR_DELAY_MS:60000}
      proxy-pool-initial-delay-ms: ${THS_PROXY_POOL_INITIAL_DELAY_MS:15000}
      proxy-pool-log-enabled: ${THS_PROXY_POOL_LOG_ENABLED:true}
      proxy-pool-log-delay-ms: ${THS_PROXY_POOL_LOG_DELAY_MS:5000}
      candidate-proxy-log-limit: ${THS_CANDIDATE_PROXY_LOG_LIMIT:200}
      max-proxy-retries: ${THS_MAX_PROXY_RETRIES:30}
      direct-first: ${THS_DIRECT_FIRST:false}
      proxy-pool-warmup-wait-ms: ${THS_PROXY_POOL_WARMUP_WAIT_MS:60000}
