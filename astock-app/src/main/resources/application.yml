server:
  port: 8080

spring:
  application:
    name: astock-emotion-system

  threads:
    virtual:
      enabled: true

  datasource:
    mysql:
      url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:astock_business}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      username: ${MYSQL_USER:astock}
      password: ${MYSQL_PASSWORD:pamirs@123}
      driver-class-name: com.mysql.cj.jdbc.Driver

    clickhouse:
      url: jdbc:clickhouse://${CLICKHOUSE_HOST:clickhouse}:${CLICKHOUSE_HTTP_PORT:8123}/${CLICKHOUSE_DATABASE:astock_analysis}?compress=0
      username: ${CLICKHOUSE_USER:default}
      password: ${CLICKHOUSE_PASSWORD:pamirs@123}
      driver-class-name: com.clickhouse.jdbc.ClickHouseDriver

astock:
  redline:
    forbid-trading-instruction: true
    forbid-mock-data: true
    require-rule-version: true
    require-data-lineage: true
