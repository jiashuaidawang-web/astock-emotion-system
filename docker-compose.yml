services:
  mysql:
    image: mysql:8.0
    container_name: astock-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-astock_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-astock_business}
      MYSQL_USER: ${MYSQL_USER:-astock}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pamirs@123}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=300
    volumes:
      - astock_mysql_data:/var/lib/mysql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: astock-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-astock_analysis}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-pamirs@123}
      TZ: Asia/Shanghai
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - astock_clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/config.d/99-enable-http.xml:/etc/clickhouse-server/config.d/99-enable-http.xml:ro
      - ./docker/clickhouse/users.d/zzzz-force-default-user.xml:/etc/clickhouse-server/users.d/zzzz-force-default-user.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 20

  selenium-chrome:
    image: selenium/standalone-chrome:4.23.1
    container_name: astock-selenium-chrome
    restart: unless-stopped
    shm_size: "2gb"
    environment:
      SE_NODE_MAX_SESSIONS: 1
      SE_NODE_OVERRIDE_MAX_SESSIONS: "true"
      TZ: Asia/Shanghai
    ports:
      - "${SELENIUM_PORT:-4444}:4444"
      - "${SELENIUM_VNC_PORT:-7900}:7900"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4444/status | grep -Eq '\"ready\"[[:space:]]*:[[:space:]]*true'"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: astock-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      selenium-chrome:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:--Xms1024m -Xmx2048m -XX:+UseG1GC}"
      LOG_PATH: ${LOG_PATH:-/app/logs}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-astock_business}
      MYSQL_USER: ${MYSQL_USER:-astock}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pamirs@123}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_HTTP_PORT: 8123
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-astock_analysis}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-pamirs@123}
      SELENIUM_REMOTE_URL: ${SELENIUM_REMOTE_URL:-http://selenium-chrome:4444/wd/hub}
      THS_PROXY_POOL: ${THS_PROXY_POOL:-}
      THS_PROXY_PROVIDER_URL: ${THS_PROXY_PROVIDER_URL:-}
      THS_PROXY_PROVIDER_URLS: ${THS_PROXY_PROVIDER_URLS:-https://api.openproxylist.xyz/http.txt,https://www.qiyunip.com/freeProxy,https://www.89ip.cn/}
      THS_PROXY_POOL_REFRESH_SECONDS: ${THS_PROXY_POOL_REFRESH_SECONDS:-300}
      THS_MAX_PROXY_POOL_SIZE: ${THS_MAX_PROXY_POOL_SIZE:-200}
      THS_MIN_USABLE_PROXY_COUNT: ${THS_MIN_USABLE_PROXY_COUNT:-30}
      THS_PROXY_CANDIDATE_LIMIT: ${THS_PROXY_CANDIDATE_LIMIT:-1000}
      THS_PROXY_PROVIDER_PAGE_LIMIT: ${THS_PROXY_PROVIDER_PAGE_LIMIT:-10}
      THS_PROXY_TEST_URL: ${THS_PROXY_TEST_URL:-http://q.10jqka.com.cn/gn/}
      THS_PROXY_TEST_URLS: ${THS_PROXY_TEST_URLS:-http://q.10jqka.com.cn/gn/,http://q.10jqka.com.cn/dy/,http://q.10jqka.com.cn/thshy/,http://q.10jqka.com.cn/zjhhy/}
      THS_PROXY_TEST_TIMEOUT_MS: ${THS_PROXY_TEST_TIMEOUT_MS:-1500}
      THS_PROXY_TEST_CONCURRENCY: ${THS_PROXY_TEST_CONCURRENCY:-64}
      THS_PROXY_TEST_CANDIDATE_LIMIT: ${THS_PROXY_TEST_CANDIDATE_LIMIT:-300}
      THS_PROXY_POOL_MONITOR_DELAY_MS: ${THS_PROXY_POOL_MONITOR_DELAY_MS:-60000}
      THS_PROXY_POOL_INITIAL_DELAY_MS: ${THS_PROXY_POOL_INITIAL_DELAY_MS:-15000}
      THS_PROXY_POOL_LOG_ENABLED: ${THS_PROXY_POOL_LOG_ENABLED:-true}
      THS_PROXY_POOL_LOG_DELAY_MS: ${THS_PROXY_POOL_LOG_DELAY_MS:-5000}
      THS_CANDIDATE_PROXY_LOG_LIMIT: ${THS_CANDIDATE_PROXY_LOG_LIMIT:-200}
      THS_MAX_PROXY_RETRIES: ${THS_MAX_PROXY_RETRIES:-30}
      THS_DIRECT_FIRST: ${THS_DIRECT_FIRST:-false}
      THS_PROXY_POOL_WARMUP_WAIT_MS: ${THS_PROXY_POOL_WARMUP_WAIT_MS:-60000}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: astock-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-18080}:80"

volumes:
  astock_mysql_data:
  astock_clickhouse_data:
